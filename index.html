<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>???</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-shadow: inset 50px 0 100px -20px #333, inset -50px 0 100px -20px #333;
            transition: 1.5s ease;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 320px;
            z-index: 2;
        }
        .card:hover {
            animation: reverse 3s infinite linear;
    border: 1px solid rgba(255, 238, 0, 0.5); /* Optional: makes the edge slightly yellow too */
    box-shadow: 0 0 100px rgb(255, 238, 0); /* Your yellow glow */
}

        #popup {
            display: none;
            height: 200px;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #050505;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #4b0082;
            box-shadow: 0 0 50px #4b0082;
            z-index: 10;
            text-align: center;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 5;
        }
        button {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 30px;
            background: rgb(0, 0, 0);
            color: rgba(255, 255, 255, 0.048);
            transition: 0.3s;
        }
        button:hover {
            color: rgb(243, 239, 4);
            box-shadow: 0 0 20px gold;
            border: 2px rgba(31, 30, 30, 0.95);
        }

        button:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <audio id="happySound" src="https://www.myinstants.com/media/sounds/happy-happy-happy-cat.mp3"></audio>
    
    <audio id="sadSound" src="Daniel_Ceasar_-_We_Find_Love_Light_In_Theme_(mp3.pm).mp3"></audio>

    <div id="overlay"></div>

    <div id="popup">
        <h2 style="color: #4b0082;"></h2>
        <p style="font-size: 1.2rem; font-style: italic;">I kneww it, you dont love mee:(((</p>
        <button onclick="location.reload()">try again😤</button>
    </div>

    <div class="card" id="quizBox">
        <h2>Are u hapi you meet me?</h2>
        <div style="margin: 25px 0;">
            <label style="cursor:pointer;"><input type="radio" name="choice" value="yes"> Yes ❤️</label>
            <label style="margin-left: 25px; cursor:pointer;"><input type="radio" name="choice" value="no"> No? 🥺</label>
        </div>
        <button class="button1" onclick="checkAnswer() ">u sure?</butto>
    </div>

    <script>
        function checkAnswer() {
            const selected = document.querySelector('input[name="choice"]:checked');
            if (!selected) return;

            const happyAudio = document.getElementById('happySound');
            const sadAudio = document.getElementById('sadSound');

            if (selected.value === "yes") {
                sadAudio.pause();
                happyAudio.play();
                
                document.getElementById('quizBox').innerHTML = `
                    <h2 style="color: #ff0077;">YAYYYYY!!!</h2>
                    <img src="happy-happy-happy-cat.gif" style="width:250px; border-radius:15px; margin:15px 0;">
                    <p style="font-weight:bold;">yeyyyyyy thankyousmuchhhhhhh!!!</p>
                `;
                document.body.style.boxShadow = "inset 80px 0 150px -30px #ff0077, inset -80px 0 150px -30px #ff0077";
            } else {
                happyAudio.pause();
                
                // Set the start time to 0:00 (lyrics: "You don't love me anymore")
                sadAudio.currentTime = 10;
                sadAudio.play().catch(e => console.log("Audio blocked by browser"));

                // Optional: Loop the first 6 seconds if you want that specific line repeated
                sadAudio.addEventListener('timeupdate', function() {
                    if(this.currentTime > 15) {
                        this.currentTime = 10;
                    }
                });

                document.getElementById('popup').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
                
                // Dramatic transformation
                document.body.style.backgroundColor = "#000";
                document.body.style.boxShadow = "inset 100px 0 250px -50px #1a0033, inset -100px 0 250px -50px #1a0033";
            }
        }
    </script>
</body>
</html>
